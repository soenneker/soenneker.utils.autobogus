name: codeql

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'test/**'
  workflow_dispatch:

env:
  NUGET_XMLDOC_MODE: skip

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: CodeQL Analysis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Restore src
        run: dotnet restore ./src/Soenneker.Utils.AutoBogus/Soenneker.Utils.AutoBogus.csproj --verbosity minimal

      - name: Build src
        run: dotnet build ./src/Soenneker.Utils.AutoBogus/Soenneker.Utils.AutoBogus.csproj --configuration Release --no-restore --verbosity minimal

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
