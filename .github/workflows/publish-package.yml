name: publish-package

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'test/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  PipelineEnvironment: true
  NUGET_XMLDOC_MODE: skip

jobs:
  publish-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setting up build version
        shell: bash
        run: |
          echo "BUILD_VERSION=4.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Get release notes from latest commit
        shell: bash
        run: |
          {
            echo "PACKAGE_RELEASE_NOTES<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore tests
        run: dotnet restore test/Soenneker.Utils.AutoBogus.Console/Soenneker.Utils.AutoBogus.Tests.Console.csproj --verbosity minimal

      - name: Build
        run: dotnet build test/Soenneker.Utils.AutoBogus.Console/Soenneker.Utils.AutoBogus.Tests.Console.csproj --configuration Release --no-restore --verbosity minimal

      - name: Test
        run: dotnet test test/Soenneker.Utils.AutoBogus.Console/Soenneker.Utils.AutoBogus.Tests.Console.csproj --configuration Release --no-build --no-restore --verbosity normal

      - name: Pack
        shell: bash
        run: |
          mkdir -p artifacts
          dotnet pack src/Soenneker.Utils.AutoBogus/Soenneker.Utils.AutoBogus.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --output ./artifacts

      - name: Publish to NuGet with retry
        shell: bash
        run: |
          for i in 1 2 3; do
            dotnet nuget push ./artifacts/*.nupkg \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "${{ secrets.NUGET__TOKEN }}" \
              --skip-duplicate && break

            if [ "$i" -lt 3 ]; then
              echo "NuGet publish failed, retrying in 10 seconds..."
              sleep 10
            else
              echo "NuGet publish failed after 3 attempts."
              exit 1
            fi
          done

      - name: Publish to GitHub Packages
        shell: bash
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source "https://nuget.pkg.github.com/soenneker/index.json" \
            --api-key "${{ secrets.GH__TOKEN }}" \
            --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH__TOKEN }}
        shell: bash
        run: |
          gh release create "v$BUILD_VERSION" \
            --title "v$BUILD_VERSION" \
            --notes "${{ env.PACKAGE_RELEASE_NOTES }}"
